{% set version = "16.1.0" %}

package:
  name: trilinos-split
  version: {{ version }}

source:
  url: https://github.com/trilinos/Trilinos/archive/trilinos-release-{{ version | replace('.', '-') }}.tar.gz
  sha256: e9651c88f581049457036cfc01b527a9d3903c257338eeeab942befd7452f23a


build:
  number: 4
  skip: true  # [win]

outputs:
  - name: trilinos
    script: build.sh  # [unix]
    script: bld.bat  # [win]
    requirements:
      build:
        - cmake >=3.23.0
        - ninja
        - make
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - {{ compiler('cxx') }}
        - numpy
        - swig
      host:
        - libblas
        - liblapack
        - {{ mpi }}  # [unix]
        - libboost-devel
        - suitesparse
        - netcdf-cxx4
        - libmatio
        - xorg-libx11
        - hdf5 * mpi_{{ mpi }}_*
        # trilinos cmake expects specific kokkos/kokkos-kernels versions
        - kokkos ==4.5.01
        - kokkos-kernels ==4.5.01
        - numpy
        - python {{ python }}
        - python_abi * *_cp313  # [py==313]
      run:
        - {{ mpi }}  # [unix]
        - libboost-devel
        - suitesparse
        # trilinos cmake expects specific kokkos/kokkos-kernels versions
        - kokkos ==4.5.01
        - kokkos-kernels ==4.5.01
        - {{ pin_compatible('numpy') }}
        - python
        - python_abi * *_cp313  # [py==313]
    build:
      run_exports:
        - {{ pin_subpackage('trilinos', max_pin='x.x') }}
    test:
      commands:
        - test -f $PREFIX/include/TeuchosCore_ConfigDefs.hpp        # [unix]
        - test -f $PREFIX/lib/libteuchoscore.{{ version }}.dylib    # [osx]
        - test -f $PREFIX/lib/libteuchoscore.so.{{ version }}       # [linux]
        - if not exist %PREFIX%\\Library\\include\\TeuchosCore_ConfigDefs.hpp exit 1  # [win]
        - if not exist %PREFIX%\\Library\\lib\\teuchoscore.lib exit 1  # [win]
  - name: pytrilinos
    script: build.sh  # [unix]
    script: bld.bat  # [win]
    requirements:  
      build:
        - cmake >=3.23.0
        - ninja
        - make
        - {{ compiler('c') }}
        - {{ stdlib("c") }}
        - {{ compiler('cxx') }}
        - numpy
        - swig
      host:
        - libblas
        - liblapack
        - {{ mpi }}  # [unix]
        - libboost-devel
        - suitesparse
        - netcdf-cxx4
        - libmatio
        - xorg-libx11
        - hdf5 * mpi_{{ mpi }}_*
        # trilinos cmake expects specific kokkos/kokkos-kernels versions
        - kokkos ==4.5.01
        - kokkos-kernels ==4.5.01
        - numpy
        - python {{ python }}
        - python_abi * *_cp313  # [py==313]
        - {{ pin_subpackage('trilinos', exact=True) }}
        - swig
      run:
        - {{ mpi }}  # [unix]
        - libboost-devel
        - suitesparse
        # trilinos cmake expects specific kokkos/kokkos-kernels versions
        - kokkos ==4.5.01
        - kokkos-kernels ==4.5.01
        - {{ pin_compatible('numpy') }}
        - python
        - python_abi * *_cp313  # [py==313]
        - {{ pin_subpackage('trilinos', exact=True) }}
        - numpy
        - mpi4py
    test:
      requires:
        - cmake >=3.10.0
        - mpi4py
      imports:
        - PyTrilinos.Teuchos
        - PyTrilinos.Epetra
        - PyTrilinos.TriUtils
        - PyTrilinos.Tpetra
        - PyTrilinos.EpetraExt
        - PyTrilinos.Domi
        - PyTrilinos.AztecOO
        - PyTrilinos.Galeri
        - PyTrilinos.Amesos
        - PyTrilinos.IFPACK
        - PyTrilinos.Komplex
        - PyTrilinos.ML
        - PyTrilinos.Anasazi

about:
  home: https://trilinos.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Sandia's suite of HPC solvers and enabling technologies
  description: Fast, compiled object-oriented algorithms and enabling technologies that support the solution of large-scale, complex multi-physics engineering and scientific problems.
  dev_url: https://github.com/trilinos/Trilinos

extra:
  recipe-maintainers:
    - rfiorella
    - pyt-viper
