{% set version = "16.1.0" %}

package:
  name: trilinos-split
  version: {{ version }}

source:
  url: https://github.com/trilinos/Trilinos/archive/trilinos-release-{{ version | replace('.', '-') }}.tar.gz
  sha256: e9651c88f581049457036cfc01b527a9d3903c257338eeeab942befd7452f23a
  patches:
    - swig-include-dirs.patch
    - tpetra-swig-remove-classic.patch


build:
  number: 4
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('trilinos', max_pin='x.x') }}

requirements:
  build:
    - cmake >=3.23.0
    - ninja
    - make
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - numpy
    - swig
  host:
    - libblas
    - liblapack
    - {{ mpi }}  # [unix]
    - libboost-devel
    - suitesparse
    - libnetcdf
    - netcdf-cxx4
    - libmatio
    - xorg-libx11
    - hdf5 * mpi_{{ mpi }}_*
    # trilinos cmake expects specific kokkos/kokkos-kernels versions
    - kokkos ==4.5.01
    - kokkos-kernels ==4.5.01
    - numpy
    - python {{ python }}
    - python_abi * *_cp313  # [py==313]
    - swig
    - mpi4py
  run:
    - {{ mpi }}  # [unix]
    - libboost-devel
    - suitesparse
    # trilinos cmake expects specific kokkos/kokkos-kernels versions
    - kokkos ==4.5.01
    - kokkos-kernels ==4.5.01
    - libnetcdf
    - netcdf-cxx4
    - {{ pin_compatible('numpy') }}
    - python
    - python_abi * *_cp313  # [py==313]
    - numpy
    - mpi4py

outputs:
  - name: trilinos
    files:
      - include/*
      - lib/lib*.so*              # [linux]
      - lib/lib*.dylib            # [osx]
      - lib/cmake/Trilinos/*
      - share/trilinos/*
    requirements:
      run:
        - {{ mpi }}  # [unix]
        - libboost-devel
        - suitesparse
        - kokkos ==4.5.01
        - kokkos-kernels ==4.5.01
        - hdf5 * mpi_{{ mpi }}_*
        - libnetcdf
        - netcdf-cxx4
        - libmatio
        - xorg-libx11
  - name: pytrilinos
    files:
      - lib/python*/site-packages/PyTrilinos/*
      - lib/python*/site-packages/PyTrilinos/**/*
    requirements:
      host:
        - python
      run:
        - {{ pin_subpackage('trilinos', exact=True) }}
        - python
        - numpy
        - mpi4py
        - {{ mpi }}  # [unix]
    test:
      requires:
        - mpi4py
      imports:
        - PyTrilinos.Teuchos
        - PyTrilinos.Epetra
        - PyTrilinos.TriUtils
        - PyTrilinos.Tpetra
        - PyTrilinos.EpetraExt
        - PyTrilinos.Isorropia
        - PyTrilinos.Pliris
        - PyTrilinos.AztecOO
        - PyTrilinos.Galeri
        - PyTrilinos.Amesos
        - PyTrilinos.IFPACK
        - PyTrilinos.Komplex
        - PyTrilinos.ML
        - PyTrilinos.Anasazi
        - PyTrilinos.NOX
        - PyTrilinos.NOX.Abstract
        - PyTrilinos.NOX.StatusTest
        - PyTrilinos.NOX.Solver
        - PyTrilinos.NOX.Epetra
        - PyTrilinos.NOX.Epetra.Interface
        - PyTrilinos.LOCA

about:
  home: https://trilinos.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Sandia's suite of HPC solvers and enabling technologies
  description: Fast, compiled object-oriented algorithms and enabling technologies that support the solution of large-scale, complex multi-physics engineering and scientific problems.
  dev_url: https://github.com/trilinos/Trilinos

extra:
  recipe-maintainers:
    - rfiorella
    - pyt-viper
