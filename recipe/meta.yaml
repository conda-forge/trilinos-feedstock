{% set version = "16.1.0" %}

package:
  name: trilinos-split
  version: {{ version }}

source:
  url: https://github.com/trilinos/Trilinos/archive/trilinos-release-{{ version | replace('.', '-') }}.tar.gz
  sha256: e9651c88f581049457036cfc01b527a9d3903c257338eeeab942befd7452f23a


build:
  number: 4
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('trilinos', max_pin='x.x') }}

requirements:
  build:
    - cmake >=3.23.0
    - ninja
    - make
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - numpy
    - swig
  host:
    - libblas
    - liblapack
    - {{ mpi }}  # [unix]
    - libboost-devel
    - suitesparse
    - libnetcdf
    - netcdf-cxx4
    - libmatio
    - xorg-libx11
    - hdf5 * mpi_{{ mpi }}_*
    # trilinos cmake expects specific kokkos/kokkos-kernels versions
    - kokkos ==4.5.01
    - kokkos-kernels ==4.5.01
    - numpy
    - python {{ python }}
    - python_abi * *_cp313  # [py==313]
    - swig
    - mpi4py
  run:
    - {{ mpi }}  # [unix]
    - libboost-devel
    - suitesparse
    # trilinos cmake expects specific kokkos/kokkos-kernels versions
    - kokkos ==4.5.01
    - kokkos-kernels ==4.5.01
    - libnetcdf
    - netcdf-cxx4
    - {{ pin_compatible('numpy') }}
    - python
    - python_abi * *_cp313  # [py==313]
    - numpy
    - mpi4py

outputs:
  - name: trilinos
    files:
      # headers
      - include/*
      # libs / cmake config
      - lib/lib*trilinos*.so*     # [linux]
      - lib/lib*trilinos*.dylib   # [osx]
      - lib/libteuchos*.so*       # [linux]
      - lib/libteuchos*.dylib     # [osx]
      - lib/libepetra*.so*        # [linux]
      - lib/libepetra*.dylib      # [osx]
      - lib/cmake/Trilinos/*
      - share/trilinos/*
  - name: pytrilinos
    files:
      # Python modules
      - lib/python*/site-packages/PyTrilinos/*
      # SWIG extension modules (names vary; adjust to actual names)
      - lib/python*/site-packages/_Epetra*.so        # [unix]
      - lib/python*/site-packages/_Teuchos*.so       # [unix]
      - lib/python*/site-packages/_Tpetra*.so        # [unix]
      - lib/libpytrilinos*.so*                       # [unix]
    test:
      requires:
        - mpi4py
      imports:
        - PyTrilinos.Teuchos
        - PyTrilinos.Epetra
        - PyTrilinos.TriUtils
        - PyTrilinos.Tpetra
        - PyTrilinos.EpetraExt
        - PyTrilinos.Domi
        - PyTrilinos.AztecOO
        - PyTrilinos.Galeri
        - PyTrilinos.Amesos
        - PyTrilinos.IFPACK
        - PyTrilinos.Komplex
        - PyTrilinos.ML
        - PyTrilinos.Anasazi

about:
  home: https://trilinos.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Sandia's suite of HPC solvers and enabling technologies
  description: Fast, compiled object-oriented algorithms and enabling technologies that support the solution of large-scale, complex multi-physics engineering and scientific problems.
  dev_url: https://github.com/trilinos/Trilinos

extra:
  recipe-maintainers:
    - rfiorella
    - pyt-viper
